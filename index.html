<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero - Icy White × Stormy Blue | عاصفة وجليد</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, 'Helvetica Neue', 'Segoe UI', sans-serif;
            background-color: #FFFFFF;
        }

        /* هيرو سكشن - خلفية بيضاء ثلجية محسّنة */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            background: linear-gradient(145deg, #FFFFFF 0%, #F5F8FF 100%);
            position: relative;
            overflow: hidden;
        }

        /* تأثير جليدي محسّن */
        .hero::before {
            content: '';
            position: absolute;
            top: -30%;
            left: -30%;
            width: 160%;
            height: 160%;
            background: radial-gradient(circle at 30% 40%, rgba(255,255,255,0.6) 0%, transparent 65%);
            pointer-events: none;
        }

        /* تأثير كريستالي */
        .hero::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 30%;
            background: linear-gradient(to top, rgba(20,24,36,0.02) 0%, transparent 100%);
            pointer-events: none;
        }

        .content {
            max-width: 900px;
            z-index: 2;
        }

        /* ===== الشريط العلوي (Badge) ===== */
        .top-bar {
            display: inline-block;
            font-size: 0.7rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #141824;
            background: rgba(20, 24, 36, 0.06);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            margin-bottom: 1.8rem;
            backdrop-filter: blur(2px);
            font-weight: 500;
            animation: fadeInUp 0.6s ease-out;
        }

        /* ===== العنوان الرئيسي ===== */
        .hero h1 {
            font-size: 3.2rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: #141824;
            margin-bottom: 1.2rem;
            line-height: 1.3;
            animation: fadeInUp 0.6s ease-out 0.1s both;
        }

        /* ===== الخط الفاصل الراقي ===== */
        .divider {
            width: 70px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #141824, #7A8595, #141824, transparent);
            margin: 1.5rem auto;
            animation: fadeInUp 0.6s ease-out 0.2s both;
        }

        /* ===== النص الفرعي ===== */
        .hero p {
            font-size: 1.05rem;
            font-weight: 350;
            color: #5A6573;
            letter-spacing: 0.5px;
            line-height: 1.8;
            max-width: 600px;
            margin: 0 auto 2.2rem auto;
            animation: fadeInUp 0.6s ease-out 0.3s both;
        }

        /* ===== مجموعة الأزرار ===== */
        .buttons {
            display: flex;
            gap: 1.2rem;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeInUp 0.6s ease-out 0.4s both;
        }

        /* الزر الأساسي - أزرق غائم مع حواف دائرية وتأثيرات احترافية */
        .btn-primary {
            background-color: #141824;
            color: #FFFFFF;
            border: none;
            padding: 1rem 2.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border-radius: 50px;
            font-family: inherit;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        /* تأثير تموج احترافي على الزر الأساسي */
        .btn-primary::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            transform: translate(-50%, -50%);
            transition: width 0.5s ease, height 0.5s ease;
            z-index: -1;
        }

        .btn-primary:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary:hover {
            background-color: #1E2432;
            transform: translateY(-3px);
            box-shadow: 0 12px 28px -10px rgba(20, 24, 36, 0.4);
        }

        /* الزر الثانوي - حواف دائرية شفافة */
        .btn-secondary {
            background: transparent;
            color: #141824;
            border: 1.5px solid rgba(20, 24, 36, 0.25);
            padding: 1rem 2.5rem;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border-radius: 50px;
            font-family: inherit;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        /* تأثير تموج احترافي على الزر الثانوي */
        .btn-secondary::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(20, 24, 36, 0.08);
            transform: translate(-50%, -50%);
            transition: width 0.5s ease, height 0.5s ease;
            z-index: -1;
          }

        .btn-secondary:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-secondary:hover {
            border-color: #141824;
            background: rgba(20, 24, 36, 0.02);
            transform: translateY(-3px);
        }

        button:active {
            transform: translateY(1px);
        }

        /* ===== أنيميشن fadeInUp احترافي ===== */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== استجابة للشاشات الصغيرة ===== */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 1.8rem;
                letter-spacing: 1px;
            }
            .hero p {
                font-size: 0.9rem;
            }
            .buttons {
                gap: 0.8rem;
            }
            .btn-primary, .btn-secondary {
                padding: 0.75rem 1.8rem;
                font-size: 0.7rem;
                letter-spacing: 1.5px;
            }
            .top-bar {
                font-size: 0.6rem;
                letter-spacing: 3px;
                padding: 0.4rem 1.2rem;
            }
        }

        /* للشاشات المتوسطة */
        @media (max-width: 480px) {
            .hero h1 {
                font-size: 1.5rem;
            }
            .hero p {
                font-size: 0.8rem;
            }
        }

        /* زر الفحص العائم (الدائرة الصغيرة) */
        .diagnostic-trigger {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            background: #141824;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            color: #00e5ff;
            font-size: 18px;
            cursor: pointer;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }
        .diagnostic-trigger:hover { transform: scale(1.1); background: #1E2432; }

        /* لوحة التقرير المنبثقة */
        .diagnostic-panel {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 340px;
            max-height: 400px;
            background: #141824;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 15px;
            color: #fff;
            font-family: monospace;
            font-size: 12px;
            z-index: 9998;
            display: none;
            overflow-y: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            direction: ltr;
            text-align: left;
        }
        .diag-line { padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .diag-success { color: #81c784; }
        .diag-error { color: #e57373; }
    </style>
</head>
<body>

    <section class="hero">
        <div class="content">
            <div class="top-bar">طبقة الأداء لعام 2026</div>
            
            <h1>تجربة تجعل متجرك<br>جزءاً من يومهم</h1>
            
            <div class="divider"></div>
            
            <p>أداء أسرع وأكثر سلاسة، بدون تعقيدات التصفح التقليدي — استجابة فورية تجعل العودة لمتجرك رغبة لا تُقاوم.</p>
            
            <div class="buttons">
                <button class="btn-primary">جرب الآن</button>
                <button class="btn-secondary">تواصل معنا</button>
            </div>
        </div>
    </section>

    <button class="diagnostic-trigger" onclick="toggleDiagPanel()">🔍</button>
    <div class="diagnostic-panel" id="diagPanel">
        <div style="color:#00e5ff; font-weight:bold; margin-bottom:10px; border-bottom:1px solid #00e5ff; padding-bottom:5px;">🛡️ Nexus TWA Radar</div>
        <div id="diagLogs">جاري فحص حالة الارتباط المباشر...</div>
    </div>

    <script>
        function toggleDiagPanel() {
            const panel = document.getElementById('diagPanel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }

        (function() {
            const logsDiv = document.getElementById('diagLogs');
            logsDiv.innerHTML = ""; // تصفير

            function addLog(msg, type) {
                const div = document.createElement('div');
                div.className = `diag-line ${type === 'success' ? 'diag-success' : type === 'error' ? 'diag-error' : ''}`;
                div.innerText = msg;
                logsDiv.appendChild(div);
            }

            const TARGET_PACKAGE = "com.example.mytwa_smart";
            const TARGET_SHA256 = "5A:8A:74:B3:62:AE:D2:DD:07:1F:87:61:10:47:3B:0F:34:EC:CF:2F:96:59:3E:B5:4F:F6:25:97:9D:3B:5D:92:10";

            addLog("⏳ Connecting to secure path...", "info");

            fetch('/.well-known/assetlinks.json')
                .then(res => {
                    if (!res.ok) throw new Error("File 404 Not Found");
                    addLog("🟢 Step 1: File Exists in Domain Root", "success");
                    return res.json();
                })
                .then(data => {
                    const statement = data[0]?.target;
                    if (!statement) {
                        addLog("❌ Step 2: Invalid JSON format structure", "error");
                        return;
                    }
                    addLog("🟢 Step 2: JSON Structure Validated", "success");

                    if (statement.package_name === TARGET_PACKAGE) {
                        addLog(`🟢 Step 3: Package Matched [${TARGET_PACKAGE}]`, "success");
                    } else {
                        addLog(`❌ Step 3: Package Mismatch! Found: ${statement.package_name}`, "error");
                    }

                    const currentSha = statement.sha256_cert_fingerprints?.[0];
                    if (currentSha === TARGET_SHA256) {
                        addLog("🟢 Step 4: SHA-256 Fingerprint Matches 100%", "success");
                        addLog("👑 RESULT: TRUST ACTIVE (TWA Approved)", "success");
                    } else {
                        addLog(`❌ Step 4: SHA Mismatch! Found: ${currentSha?.substring(0,10)}...`, "error");
                        addLog("👑 RESULT: VERIFICATION FAILED", "error");
                    }
                })
                .catch(err => {
                    addLog(`❌ Fatal Error: ${err.message}`, "error");
                    addLog("👑 RESULT: BLOCK / UNTRUSTED WEBSITE", "error");
                });
        })();
    </script>
</body>
        </html>
