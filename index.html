<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero - Icy White × Stormy Blue | عاصفة وجليد</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, 'Helvetica Neue', 'Segoe UI', sans-serif;
            background-color: #FFFFFF;
        }

        /* هيرو سكشن - خلفية بيضاء ثلجية محسّنة */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            background: linear-gradient(145deg, #FFFFFF 0%, #F5F8FF 100%);
            position: relative;
            overflow: hidden;
        }

        /* تأثير جليدي محسّن */
        .hero::before {
            content: '';
            position: absolute;
            top: -30%;
            left: -30%;
            width: 160%;
            height: 160%;
            background: radial-gradient(circle at 30% 40%, rgba(255,255,255,0.6) 0%, transparent 65%);
            pointer-events: none;
        }

        /* تأثير كريستالي */
        .hero::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 30%;
            background: linear-gradient(to top, rgba(20,24,36,0.02) 0%, transparent 100%);
            pointer-events: none;
        }

        .content {
            max-width: 900px;
            z-index: 2;
        }

        /* ===== الشريط العلوي (Badge) ===== */
        .top-bar {
            display: inline-block;
            font-size: 0.7rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #141824;
            background: rgba(20, 24, 36, 0.06);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            margin-bottom: 1.8rem;
            backdrop-filter: blur(2px);
            font-weight: 500;
            animation: fadeInUp 0.6s ease-out;
        }

        /* ===== العنوان الرئيسي ===== */
        .hero h1 {
            font-size: 3.2rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: #141824;
            margin-bottom: 1.2rem;
            line-height: 1.3;
            animation: fadeInUp 0.6s ease-out 0.1s both;
        }

        /* ===== الخط الفاصل الراقي ===== */
        .divider {
            width: 70px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #141824, #7A8595, #141824, transparent);
            margin: 1.5rem auto;
            animation: fadeInUp 0.6s ease-out 0.2s both;
        }

        /* ===== النص الفرعي ===== */
        .hero p {
            font-size: 1.05rem;
            font-weight: 350;
            color: #5A6573;
            letter-spacing: 0.5px;
            line-height: 1.8;
            max-width: 600px;
            margin: 0 auto 2.2rem auto;
            animation: fadeInUp 0.6s ease-out 0.3s both;
        }

        /* ===== مجموعة الأزرار ===== */
        .buttons {
            display: flex;
            gap: 1.2rem;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeInUp 0.6s ease-out 0.4s both;
        }

        /* الزر الأساسي - أزرق غائم مع حواف دائرية وتأثيرات احترافية */
        .btn-primary {
            background-color: #141824;
            color: #FFFFFF;
            border: none;
            padding: 1rem 2.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border-radius: 50px;
            font-family: inherit;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        /* تأثير تموج احترافي على الزر الأساسي */
        .btn-primary::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            transform: translate(-50%, -50%);
            transition: width 0.5s ease, height 0.5s ease;
            z-index: -1;
        }

        .btn-primary:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary:hover {
            background-color: #1E2432;
            transform: translateY(-3px);
            box-shadow: 0 12px 28px -10px rgba(20, 24, 36, 0.4);
        }

        /* الزر الثانوي - حواف دائرية شفافة */
        .btn-secondary {
            background: transparent;
            color: #141824;
            border: 1.5px solid rgba(20, 24, 36, 0.25);
            padding: 1rem 2.5rem;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border-radius: 50px;
            font-family: inherit;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        /* تأثير تموج احترافي على الزر الثانوي */
        .btn-secondary::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(20, 24, 36, 0.08);
            transform: translate(-50%, -50%);
            transition: width 0.5s ease, height 0.5s ease;
            z-index: -1;
          }

        .btn-secondary:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-secondary:hover {
            border-color: #141824;
            background: rgba(20, 24, 36, 0.02);
            transform: translateY(-3px);
        }

        button:active {
            transform: translateY(1px);
        }

        /* ===== أنيميشن fadeInUp احترافي ===== */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== استجابة للشاشات الصغيرة ===== */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 1.8rem;
                letter-spacing: 1px;
            }
            .hero p {
                font-size: 0.9rem;
            }
            .buttons {
                gap: 0.8rem;
            }
            .btn-primary, .btn-secondary {
                padding: 0.75rem 1.8rem;
                font-size: 0.7rem;
                letter-spacing: 1.5px;
            }
            .top-bar {
                font-size: 0.6rem;
                letter-spacing: 3px;
                padding: 0.4rem 1.2rem;
            }
        }

        /* للشاشات المتوسطة */
        @media (max-width: 480px) {
            .hero h1 {
                font-size: 1.5rem;
            }
            .hero p {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="content">
            <div class="top-bar">طبقة الأداء لعام 2026</div>
            
            <h1>تجربة تجعل متجرك<br>جزءاً من يومهم</h1>
            
            <div class="divider"></div>
            
            <p>أداء أسرع وأكثر سلاسة، بدون تعقيدات التصفح التقليدي — استجابة فورية تجعل العودة لمتجرك رغبة لا تُقاوم.</p>
            
            <div class="buttons">
                <button class="btn-primary">جرب الآن</button>
                <button class="btn-secondary">تواصل معنا</button>
            </div>
        </div>
    </section>

    <script>
        (function() {
            console.log("%c🛡️ نظام فحص الـ TWA الداخلي قيد التشغيل الحاد...", "color: #00e5ff; font-weight: bold; font-size: 14px;");

            // البيانات الصارمة المطلوبة لتطبيقك الحالي
            const TARGET_PACKAGE = "com.example.mytwa_smart";
            const TARGET_SHA256 = "5A:8A:74:B3:62:AE:D2:DD:07:1F:87:61:10:47:3B:0F:34:EC:CF:2F:96:59:3E:B5:4F:F6:25:97:9D:3B:5D:92:10";
            const TARGET_RELATION = "delegate_permission/common.handle_all_urls";
            const REDIRECT_URL = "https://row.gymshark.com/";

            let hasError = false;

            // جلب ملف الـ assetlinks الملعون من مساره الصارم
            fetch('/.well-known/assetlinks.json')
                .then(response => {
                    if (!response.ok) {
                        hasError = true;
                        console.error(`❌ المرحلة 1 (الوصول): ملف الـ assetlinks.json غير موجود في مساره الصحيح! (كود الخطأ: ${response.status})`);
                        return null;
                    }
                    console.log("🟢 المرحلة 1: تم الوصول للملف بنجاح.");
                    return response.text();
                })
                .then(text => {
                    if (!text) return;

                    let data;
                    try {
                        data = JSON.parse(text);
                        console.log("🟢 المرحلة 2: تنسيق ملف الـ JSON سليم تماماً وصالح.");
                    } catch (e) {
                        hasError = true;
                        console.error("❌ المرحلة 2 (التنسيق): ملف الـ JSON تالف أو يحتوي على خطأ إملائي في الأقواس والفاصلات!");
                        return;
                    }

                    const statement = data[0]?.target;
                    const relation = data[0]?.relation?.[0];

                    if (!statement) {
                        hasError = true;
                        console.error("❌ خطأ بنيوي: الهيكل الداخلي للملف ناقص أو لا يحتوي على كائن target.");
                        return;
                    }

                    // 1. فحص Package Name
                    if (statement.package_name === TARGET_PACKAGE) {
                        console.log(`🟢 المرحلة 3: الـ Package Name متطابق وسليم (${TARGET_PACKAGE})`);
                    } else {
                        hasError = true;
                        console.error(`❌ المرحلة 3 (Package Name): غير مطابق!\nالمتوقع: ${TARGET_PACKAGE}\nالموجود حالياً: ${statement.package_name}`);
                    }

                    // 2. فحص البصمة SHA-256
                    const currentSha = statement.sha256_cert_fingerprints?.[0];
                    if (currentSha === TARGET_SHA256) {
                        console.log("🟢 المرحلة 4: بصمة الـ SHA-256 متطابقة ومثالية 100%.");
                    } else {
                        hasError = true;
                        console.error(`❌ المرحلة 4 (SHA-256): البصمة الرقمية غير مطابقة لخادم جيت هاب!\nالمتوقع: ${TARGET_PACKAGE}\nالموجود حالياً: ${currentSha}`);
                    }

                    // 3. فحص العلاقة Relation
                    if (relation === TARGET_RELATION) {
                        console.log("🟢 المرحلة 5: العلاقة الممنوحة (Relation) صحيحة ومعتمدة.");
                    } else {
                        hasError = true;
                        console.error(`❌ المرحلة 5 (Relation): العلاقة ناقصة أو مكتوبة بشكل خاطئ!\nالمتوقع: ${TARGET_RELATION}\nالموجود حالياً: ${relation}`);
                    }

                    // التحقق النهائي للانطلاق أو الإيقاف
                    if (!hasError) {
                        console.log("%c🟢 الفحص نجح بالكامل! سيتم توجيهك إلى متجر العميل خلال 3 ثوانٍ...", "color: #00e676; font-weight: bold;");
                        setTimeout(() => {
                            window.location.href = REDIRECT_URL;
                        }, 3000);
                    } else {
                        console.log("%c❌ تم إيقاف التحويل التلقائي لوجود أخطاء في ملف التحقق الملعون. راجع السجلات أعلاه.", "color: #ff1744; font-weight: bold;");
                    }
                })
                .catch(err => {
                    console.error("❌ خطأ شبكة غير متوقع أثناء فحص الملف:", err);
                });
        })();
    </script>
</body>
</html>
