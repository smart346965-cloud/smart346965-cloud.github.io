<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Diagnostics - فحص المصنع</title>
    <style>
        body { font-family: sans-serif; background-color: #141824; color: #fff; padding: 20px; direction: rtl; text-align: right; }
        .card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        h1 { color: #00e5ff; font-size: 22px; margin-bottom: 10px; }
        .log-item { padding: 10px; margin: 8px 0; border-radius: 6px; font-family: monospace; font-size: 13px; }
        .success { background: rgba(76, 175, 80, 0.2); color: #81c784; border-right: 4px solid #4caf50; }
        .error { background: rgba(244, 67, 54, 0.2); color: #e57373; border-right: 4px solid #f44336; }
        .loading { color: #ffeb3b; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🔍 رادار الفحص الذكي لـ Royal Cloud Factory</h1>
        <p>هذا النظام يفحص حالياً ملف الـ AssetLinks من داخل سيرفرات GitHub الرسمية مباشرة وبدون تخمين.</p>
    </div>

    <div class="card">
        <h3>📊 نتائج الفحص الفوري على الجوال:</h3>
        <div id="logs"><span class="loading">جاري الاتصال بالسيرفر وسحب الملف...</span></div>
    </div>

    <script>
        const logsDiv = document.getElementById('logs');
        function printLog(msg, isSuccess) {
            const div = document.createElement('div');
            div.className = `log-item ${isSuccess ? 'success' : 'error'}`;
            div.innerText = (isSuccess ? "🟢 " : "❌ ") + msg;
            logsDiv.appendChild(div);
        }

        // المسار الصارم لملفك الحالي على المستودع الرئيسي
        fetch('/.well-known/assetlinks.json')
            .then(res => {
                logsDiv.innerHTML = ""; // تنظيف كلمة جاري التحميل
                if (!res.ok) {
                    printLog(`الملف غير موجود! السيرفر يعطي كود خطأ: ${res.status}. تأكد من رفع ملف .nojekyll في المستودع لفتح الحظر عن المجلد.`, false);
                    return null;
                }
                printLog("ممتاز! الملف موجود في المسار الصحيح والسيرفر استجاب بنجاح.", true);
                return res.json();
            })
            .then(data => {
                if (!data) return;
                printLog("تم قراءة ملف الـ JSON وتنسيقه سليم بنسبة 100%.", true);
                
                const appData = data[0]?.target;
                if(appData) {
                    printLog(`اسم الحزمة المكتشف في موقعك: ${appData.package_name}`, true);
                    printLog(`بصمة الـ SHA256 المكتشفة في موقعك: ${appData.sha256_cert_fingerprints?.[0]}`, true);
                    printLog("إذا كانت هذه البيانات مطابقة لملف الـ APK الخاص بك، فإن نظام التثبيت آمن تماماً وسيختفي الشريط!", true);
                } else {
                    printLog("محتوى الملف بالداخل لا يحتوي على بيانات Target صحيحة.", false);
                }
            })
            .catch(err => {
                logsDiv.innerHTML = "";
                printLog(`فشل الفحص: لم نتمكن من الوصول للملف بسبب الحظر الأمني لجيت هاب. يرجى إنشاء ملف باسم .nojekyll فوراً في المستودع لحل المشكلة. سياق الخطأ: ${err.message}`, false);
            });
    </script>
</body>
</html>
